name: CI Pipeline

on:
  push:
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8

      - run: flake8 api worker tests --max-line-length=120

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: frontend

      - run: npx eslint . || true
        working-directory: frontend

      - run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install pytest pytest-cov requests httpx
          pip install -r api/requirements.txt

      - run: PYTHONPATH=. pytest tests --cov=api --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api ./api
      - run: docker build -t worker ./worker
      - run: docker build -t frontend ./frontend

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api ./api
      - run: docker build -t worker ./worker
      - run: docker build -t frontend ./frontend

      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend
          severity: HIGH,CRITICAL
          exit-code: 0

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - run: sleep 20

      - run: curl http://localhost:8000/health
      - run: curl http://localhost:3000

      - run: curl -X POST http://localhost:8000/jobs

      - if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - run: echo "Rolling deployment simulated successfully"