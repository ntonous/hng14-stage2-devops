name: CI Pipeline

on:
  push:
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Linter
        run: pip install flake8

      - name: Lint Python Code
        run: flake8 api worker tests --max-line-length=120

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Lint Frontend Code
        working-directory: frontend
        run: npx eslint . || true

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Test Dependencies
        run: |
          pip install pytest pytest-cov requests httpx
          pip install -r api/requirements.txt

      - name: Run Unit Tests
        run: PYTHONPATH=. pytest tests --cov=api --cov-report=xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build API Image
        run: docker build -t api ./api

      - name: Build Worker Image
        run: docker build -t worker ./worker

      - name: Build Frontend Image
        run: docker build -t frontend ./frontend

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Images
        run: |
          docker build -t api ./api
          docker build -t worker ./worker
          docker build -t frontend ./frontend

      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Worker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend
          severity: HIGH,CRITICAL
          exit-code: 0

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Environment File
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_PORT=8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start Application Stack
        run: docker compose up -d --build

      - name: Wait for Services
        run: sleep 20

      - name: Test API Health
        run: curl http://localhost:8000/health

      - name: Test Frontend
        run: curl http://localhost:3000

      - name: Submit Job Request
        run: curl -X POST http://localhost:8000/jobs

      - name: Shutdown Stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simulated Deployment
        run: echo "Rolling deployment simulated successfully"